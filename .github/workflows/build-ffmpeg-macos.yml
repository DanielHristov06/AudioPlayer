name: Build ffmpeg macOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Install dependencies
        run: |
          brew update
          brew install nasm pkg-config

      - name: Clone ffmpeg
        run: git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git

      - name: Build LAME from source (static)
        run: |
          curl -L "https://sourceforge.net/projects/lame/files/lame/3.100/lame-3.100.tar.gz/download" -o lame-3.100.tar.gz
          tar -xzf lame-3.100.tar.gz
          cd lame-3.100
          ./configure \
            --prefix="$GITHUB_WORKSPACE/ffmpeg_deps" \
            --disable-shared \
            --enable-static
          make -j"$(sysctl -n hw.logicalcpu)"
          make install

      - name: Build libogg from source (static)
        run: |
          curl -L "https://downloads.xiph.org/releases/ogg/libogg-1.3.5.tar.gz" -o libogg.tar.gz
          tar -xzf libogg.tar.gz
          cd libogg-1.3.5
          sed -i '' 's/-force_cpusubtype_ALL//g' ltmain.sh
          ./configure \
            --prefix="$GITHUB_WORKSPACE/ffmpeg_deps" \
            --disable-shared \
            --enable-static
          make -j"$(sysctl -n hw.logicalcpu)"
          make install

      - name: Build libvorbis from source (static)
        run: |
          curl -L "https://downloads.xiph.org/releases/vorbis/libvorbis-1.3.7.tar.gz" -o libvorbis.tar.gz
          tar -xzf libvorbis.tar.gz
          cd libvorbis-1.3.7
          export FFMPEG_DEPS="$GITHUB_WORKSPACE/ffmpeg_deps"
          export PKG_CONFIG_PATH="$FFMPEG_DEPS/lib/pkgconfig"
          ./configure \
            --prefix="$FFMPEG_DEPS" \
            --disable-shared \
            --enable-static \
            --with-ogg="$FFMPEG_DEPS" \
            --disable-examples \
            --disable-docs
          make -j"$(sysctl -n hw.logicalcpu)" -C lib
          make -C lib install
          make -C include install

      - name: Configure
        working-directory: ffmpeg
        run: |
          export FFMPEG_DEPS="$GITHUB_WORKSPACE/ffmpeg_deps"
          export PKG_CONFIG_PATH="$FFMPEG_DEPS/lib/pkgconfig"

          ./configure \
            --prefix="$PWD/build" \
            --cc=clang \
            --enable-small \
            --disable-everything \
            --enable-ffmpeg \
            --disable-shared \
            --enable-static \
            --enable-protocol=file \
            --enable-demuxer=matroska,mov,mp3,ogg,flac,wav \
            --enable-decoder=opus,aac,mp3,vorbis,flac,pcm_s16le,pcm_s24le,pcm_f32le \
            --enable-encoder=libmp3lame,libvorbis,flac,pcm_s16le \
            --enable-muxer=mp3,mov,mp4,ogg,flac,wav \
            --enable-filter=aformat,aresample \
            --enable-libmp3lame \
            --enable-libvorbis \
            --disable-debug \
            --disable-doc \
            --disable-network \
            --disable-avdevice \
            --disable-swscale \
            --disable-xlib \
            --disable-sdl2 \
            --extra-cflags="-I$FFMPEG_DEPS/include" \
            --extra-ldflags="-L$FFMPEG_DEPS/lib"

      - name: Build
        working-directory: ffmpeg
        run: |
          make -j"$(sysctl -n hw.logicalcpu)"
          make install

      - name: Check linked libraries
        run: |
          file ffmpeg/build/bin/ffmpeg
          otool -L ffmpeg/build/bin/ffmpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos
          path: ffmpeg/build/bin/ffmpeg