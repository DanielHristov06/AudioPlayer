name: Build ffmpeg macOS

on:
  push:
    branches:
      - yt-dlp-introduction
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Install dependencies
        run: |
          brew update
          brew install nasm pkg-config

      - name: Clone ffmpeg
        run: git clone --depth 1 https://git.ffmpeg.org/ffmpeg.git

      - name: Build LAME from source (static)
        run: |
          curl -L "https://sourceforge.net/projects/lame/files/lame/3.100/lame-3.100.tar.gz/download" -o lame-3.100.tar.gz
          tar -xzf lame-3.100.tar.gz
          cd lame-3.100
          ./configure \
            --prefix="$GITHUB_WORKSPACE/ffmpeg_deps" \
            --disable-shared \
            --enable-static
          make -j"$(sysctl -n hw.logicalcpu)"
          make install

      - name: Configure
        working-directory: ffmpeg
        run: |
          export FFMPEG_DEPS="$GITHUB_WORKSPACE/ffmpeg_deps"
          export PKG_CONFIG_PATH="$FFMPEG_DEPS/lib/pkgconfig"

          ./configure \
            --prefix="$PWD/build" \
            --cc=clang \
            --enable-small \
            --disable-everything \
            --enable-ffmpeg \
            --disable-shared \
            --enable-static \
            --enable-protocol=file \
            --enable-demuxer=matroska,mov,mp3 \
            --enable-decoder=opus,aac,mp3 \
            --enable-encoder=libmp3lame \
            --enable-muxer=mp3,mov,mp4 \
            --enable-filter=aformat,aresample \
            --enable-libmp3lame \
            --disable-debug \
            --disable-doc \
            --disable-network \
            --disable-avdevice \
            --disable-swscale \
            --disable-xlib \
            --disable-sdl2 \
            --extra-cflags="-I$FFMPEG_DEPS/include" \
            --extra-ldflags="-L$FFMPEG_DEPS/lib"

      - name: Build
        working-directory: ffmpeg
        run: |
          make -j"$(sysctl -n hw.logicalcpu)"
          make install

      - name: Check linked libraries
        run: |
          file ffmpeg/build/bin/ffmpeg
          otool -L ffmpeg/build/bin/ffmpeg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ffmpeg-macos
          path: ffmpeg/build/bin/ffmpeg